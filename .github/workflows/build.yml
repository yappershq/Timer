name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Kreedz.slnx

      - name: Publish Kreedz.Core
        run: >
          dotnet publish Kreedz.Core/Kreedz.Core.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -p:CIBuild=true
          -o sharp/modules/Kreedz.Core
          --no-restore

      - name: Publish Kreedz.RequestManager
        run: >
          dotnet publish Kreedz.RequestManager/Kreedz.RequestManager.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -o sharp/modules/Kreedz.RequestManager
          --no-restore

      - name: Publish Kreedz.Mode.VNL
        run: >
          dotnet publish Kreedz.Mode.VNL/Kreedz.Mode.VNL.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -o sharp/modules/Kreedz.Mode.VNL
          --no-restore

      - name: Publish Kreedz.Mode.CKZ
        run: >
          dotnet publish Kreedz.Mode.CKZ/Kreedz.Mode.CKZ.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -o sharp/modules/Kreedz.Mode.CKZ
          --no-restore

      - name: Publish Kreedz.Shared
        run: >
          dotnet publish Kreedz.Shared/Kreedz.Shared.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -o sharp/shared/Kreedz.Shared
          --no-restore

      - name: Stage assets
        run: cp -r .assets/* sharp/ 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kreedz
          path: sharp/

      - name: Package release archive
        if: github.event_name == 'release'
        run: |
          cd sharp
          zip -r ../Kreedz-${{ github.event.release.tag_name }}.zip .

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Kreedz-${{ github.event.release.tag_name }}.zip
