name: Build & Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]

env:
  DOTNET_VERSION: '10.0.x'
  CONFIGURATION: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Kreedz.slnx

      - name: Publish modules
        run: |
          for proj in Kreedz.Core Kreedz.RequestManager \
                      Kreedz.Mode.VNL Kreedz.Mode.CKZ \
                      Kreedz.Style.ABH Kreedz.Style.LGJ Kreedz.Style.LowGrav Kreedz.Style.Ice \
                      Kreedz.Style.WSOnly Kreedz.Style.ADOnly \
                      Kreedz.Anticheat Kreedz.Jumpstats Kreedz.Hud Kreedz.Global; do
            dotnet publish "$proj/$proj.csproj" \
              -c "${{ env.CONFIGURATION }}" -p:Platform=x64 -p:CIBuild=true \
              -o "sharp/modules/$proj" --no-restore
          done

      - name: Publish Kreedz.Shared
        run: >
          dotnet publish Kreedz.Shared/Kreedz.Shared.csproj
          -c ${{ env.CONFIGURATION }}
          -p:Platform=x64
          -o sharp/shared/Kreedz.Shared
          --no-restore

      - name: Stage assets
        run: cp -r .assets/* sharp/ 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kreedz
          path: sharp/

      - name: Package release archive
        if: github.event_name == 'release'
        run: |
          cd sharp
          zip -r ../Kreedz-${{ github.event.release.tag_name }}.zip .

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Kreedz-${{ github.event.release.tag_name }}.zip
